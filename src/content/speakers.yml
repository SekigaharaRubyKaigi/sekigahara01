east:  # 東軍
  - name: "kazzix14"
    bushoName: "源村田信濃掾構幾寿郎一真"
    role: "先鋒"
    githubID: "kazzix14"
    xID: "kazzix14"
    title: "Sorbetの型がRailsのMVC全てを貫通するまで"
    description: "RailsアプリケーションにSorbetやSteepなどの型システムを導入すると、すぐにある事実に気づきます。既存のコードに丁寧に型を書いているにも関わらず、Controllerのparamsやレスポンス、ViewのERBテンプレート、Stimulusのコードなど、Sorbetの型が効かない部分多数あることです。人間がViewやフロントエンド・ドキュメントを書くときはもちろん、LLMによるコーディングが普及してきた現代においては、型チェックによるフィードバックはさらに重要です。本発表では、Model, View, Controller, さらにはブラウザ上で動作するコードまで、Railsアプリケーションの全レイヤーにSorbetの型を適用するために行った一連の取り組みを紹介します。"
    bio: "TwoGateという会社でRailsを書いています。音楽や構造などが好きです。"
    bushoBio: |-
      二門に与し、紅玉軌道を組み立つる者なり。音曲、理の妙などを玩ぶ。

  - name: "chobishiba"
    bushoName: "橘小芝内匠頭緒美三幸"
    role: "次鋒"
    githubID: "ksbmyk"
    xID: "chobishiba"
    title: "気づいたらRubyで100作品 ー クリエイティブコーディングが生活の一部になるまで"
    description: "美大でコードで絵を描くクリエイティブコーディングに出会ったとき、楽しそうだと思いました。しかし楽しみ方がわかりませんでした。講評に悩み1年間作品が作れなくなったこともあります。しかしRubyで作り始めたことにより全ては変わりました。手に馴染んだ言語で作ったら楽しくなり、気づけば作品数は100を超えていました。本トークでは作品とともに、ただ好きなだけで続けた先に何があったかをお話しします。"
    bio: "Rubyist & Creative Coder"
    bushoBio: |-
      紅玉使いにして彩図絵師

  - name: "Toshio Maki"
    bushoName: "源牧雅楽頭ミュージ郎俊男"
    role: "中堅"
    githubID: "kirikak2"
    xID: "Kirika_K2"
    title: "Play Music on Ruby ── PicoRubyで作るMIDIオーケストレーションツール"
    description: "シンセサイザー、音源モジュール、エフェクター。音楽制作の現場には、MIDIで繋がった多くの機器が共演しています。それらを自分の思い通りにルーティングし、自在にコントロールできたら──そんな夢を、Rubyで実現しようとした話をします。本発表では、PicoRubyを使ってMIDI機器のオーケストレーションツールを自作した取り組みを紹介します。PicoRubyにMIDI機能を実装し、複数のMIDI機器を受信・変換・転送するハブとして機能させることがテーマです。マイコン上でRubyが音楽を「指揮」するためには、ウェブ開発とは異なる制約と向き合う必要があります。UARTやUSB MIDIのハードウェア制御、リアルタイムなメッセージルーティング、限られたメモリの中でのイベント処理。そしてそれをRubyらしいDSLで美しく記述できるか、という設計上の挑戦でもあります。コードと実機デモを交えながら、Rubyが音楽の現場に立つ瞬間をお届けします。"
    bio: "自作キーボードへの興味をきっかけにESP32・RP2040などのボードの上で動くPicoRubyの移植・拡張に取り組むようになり、その延長で趣味のDTMと組み込み開発が接続した。KeebKaigi 2023ではPRK Firmwareを使った自作キーボードを持参し、「PRK_firmwareはMIDI実装の夢を見るか」と題して登壇。現在はその続きとして、M5Stack上で動作するMIDI機器オーケストレーションツール「midori」の実装を進めている。Omotesando.rbのオーガナイザーとして、企画運営に携わっています。"
    bushoBio: |-
      我こそは清和源氏の末裔、牧の家を継ぐ者、雅楽頭ミュージ郎俊男なり。
      そもそもの起こりは、手づから打鍵盤（うちけんばん）を組み上げんと志したるに発す。ESP32・RP2040と申す小さき石（チップ）の上に、紅玉PicoRubyを移し植え、これを鍛え増す細工に没頭するうち、かねて嗜む卓上音曲（DTM）の道と、機巧（くみこみ）の細工とが、一筋に繋がりたり。
      慶ばしき年「KeebKaigi 2023」の評定の場には、PRK Firmwareを仕込みし手製の打鍵盤を引っ提げて参陣し、「PRK_firmware は MIDI 実装の夢を見るか」と題して高座にて一席講じた次第。
      ただいまはその続きとして、五重ねの板「M5Stack」の上にて、MIDI の諸楽器を統べる軍配——「midori」と名付けし下知役（げちやく）——の鍛え上げに励みおる。我が放つ「ミディの密書」は、この midori の采配に従いて諸方の楽器へ駆け、合奏を一つに束ねる仕儀にござる。
      加えて、紅玉党（Ruby）の集い「Omotesando.rb」にて、その差配・旗振り役を仰せつかっておる。
      音曲・調律・打鍵盤・機巧の道、よろずの儀あらば、この俊男にお任せあれ。

  - name: "kinoppyd"
    bushoName: "紅玉宿禰木下赤羽守ppyd翔央"
    role: "副将"
    githubID: "kinoppyd"
    xID: "GhostBrain"
    title: "Job戦国時代"
    description: "世はJob戦国時代、Sidekiq軍とSolidQueue軍のベンチマーク合戦が幕を開ける。"
    bio: "Programmer, work at SmartHR."
    bushoBio: |-
      やあやあ、遠からん者は音にも聞け、近くば寄って目にも見よ。
      我こそは、父を筑前国に持ち、母を河内国に仰ぎ、河内の地に生を享け、幼き日を武蔵国にて過ごせし者。
      幼少の砌より紅玉の武に身を投じ、ついには暗黒の位を賜りし者なり。
      今は蒼色人労の地にて武の道を磨き、近頃は微小紅玉の術理を究めんと、新たなる技の研鑽に励むものなり。

west:  # 西軍
  - name: "森塚三矢大阪守真年"
    bushoName: "大江森塚三矢大坂守少輔次郎真年"
    role: "先鋒"
    githubID: "sanfrecce-osaka"
    xID: "sanfrecce_osaka"
    title: "拙者、『型は欲しいが型は書きたくない』者たちとの和睦を結び、るびぃにおける型の領地安堵を実現せんと欲す者也"
    description: |
      時は関ヶ原の戦い、西軍の島津義弘隊は敵中突破による前進退却を敢行し薩摩への帰国に成功、世に名高い「島津の退き口」を実現させ申した。
      また合戦後、東軍の徳川家康と講和交渉を行った島津義久殿と島津家久殿は粘り強い交渉の結果、所領を削減されることなく江戸時代を迎えることに成功し申した。
      時は巡り令和の現世、るびぃすとは「型を好む者」と「型を好まない者」に分かれて未だに小競り合いが絶えぬと伝え聞いておりまする。
      「型を好まない者」は口を揃えて「型は欲しいが型は書きたくない」と申しまするが、この言葉が議論の焦点を曇らせ、小競り合いが絶えぬ原因となっていると拙者は睨んでおりまする。
      関ヶ原るびぃ会議の戦場の中にも「型を好まない者」がかなり多くございましょう。
      かような天下分け目の合戦場の中で行われるこの一番勝負にあたり、拙者なりの「島津の退き口」を敢行し、そのうえでいかに和睦を結びるびぃにおける型の領地安堵を実現していかんとするかを御覧じましょうぞ。

      Ruby の型を巡る話題でよく「型は欲しいが型は書きたくない」という表現が様々な場面でカジュアルに使われます。
      しかし最近私はこの表現が Ruby の型を巡る議論の妨げになっているのではないかと思い始めました。
      このセッションではこの表現を紐解き、Ruby を使った開発において型に思いのある人、詳しい人でなくても型の恩恵を受けられる状態を実現するための道筋を探っていきます。

      このセッションにおける表現について
      - 島津の退き口: 領地安堵を実現するための、このセッションで提示する道筋のことを指します
      - 和睦: 型に否定的な人と型の利用を促進したい人との相互理解を指します
      - 領地安堵: Ruby を使った開発において型に思いのある人、詳しい人でなくても型の恩恵を受けられる状態が実現されることを指します
    bio: "ふぃよるどぶぅときゃんぷ、株式会社らぐざいあ、集金系さぁずをへて株式会社りぃなぁてくのろじぃずに属す。河内国の出身にて好む機能はぱたぁんまっちんぐ。無類のこみゅにてぃ好きにて、ひらかたあぁるびぃ、まちだあぁるびぃの主催も執り行っている"
    bushoBio: |-
      普威夜徒の修練場にて戦の術を学び、これを修め候。
      羅具座威按国の工兵衆、並びに某国の徴収の理を整えし勘定所への仕官を経て、当節は兵站の刷新を旗印に掲げる鈴威那按技術国に奉公し日々武芸知略を磨き居り申す。
      河内国の出自にて、好む戦術は「型照合の計」に御座る。
      頻りに諸国の紅玉党の寄合を巡り交流と見識を深め、枚方城、小山田城における寄合衆の頭目も務め居り候。

  - name: "S.H."
    bushoName: "平毛利石見守八郎秀穎"
    role: "次鋒"
    githubID: "S-H-GAMELINKS"
    title: "Termfront: Ruby標準ライブラリだけで作るFPS"
    description: "皆さんはFPS(First Person Shooter)をやりますか？僕はFPSが好きすぎて、ついにRubyでFPSゲームを作り始めました。本発表では、Rubyの標準ライブラリのみで実装したターミナルFPS「Termfront」の設計と実装を解説します。Termfrontは標準ライブラリのみを使用し、メニュー画面、入力処理、マップ表示、キャンペーン、疑似3D描画などFPSに必要な要素に加え、TLSで暗号化された通信によるオンライン対戦モードまでをRubyだけで構築しています。制約の多いターミナル環境でどのようにFPSを成立させたのか。設計判断や実装の工夫を、実際のデモを交えながらお話しします。また当日は壇上の僕と会場のRubyistたちでインターネット越しにFPSで『合戦』ができるよう準備しています。本発表は「ゲームを作ってみた」という話ではありません。Rubyの標準ライブラリをいかに使いこなすか。その挑戦の記録です。"
    bio: "RubyとFPSが好きなRubyist。FPSが好きすぎて、ついにRubyでFPSゲームを作り始めた。"
    bushoBio: |-
      紅玉と一人称火砲術を嗜む紅玉派。一人称火砲術を極めんと、ついに紅玉にて修練場を作り始め申した。

  - name: "Masataka Pocke Kuwabara"
    bushoName: "藤原桒原備中守歩通鍵仁雄"
    role: "中堅"
    githubID: "pocke"
    xID: "p_ck_"
    title: "New \"Type\" system on PicoRuby"
    description: "PicoRubyを使った\"Type\"システムを作ったので紹介します。これはまったく新しくて、ダイナミックで、そしてとても楽しい\"Type\"システムです。このトークではその紹介と、どのようにデザインしたのかをお話ししながら、楽しさをお届けしようと思います。"
    bio: |-
      RBSのメンテナ。電子工作初心者。羽角副将の次にPicoRubyのコードを多く消した人間。
      神奈川県出身。コロナ禍を期にそれまで縁もゆかりも無かった岡山県に引っ越し、それ以来岡山を満喫している。
      ピアノが趣味で、好きな曲をのんびり練習している。最近は新たな趣味としてベランダで蝋梅と菊芋を育て始めた。
      株式会社コードタクト勤務。
    bushoBio: |-
      RBSの守護を任ぜられ、PicoRubyの城中においては羽角副将に次ぎて冗長なる符を削ぎ落とすこと最も多し。機巧の道は未だ初心なれば、日夜研鑽の途上にあり。
      生国は武蔵なるが、近年の疫禍を機に縁なき備中の地へ陣を移せり。以来、この地の風光を愛で、心穏やかに過ごす。
      閑暇には鍵盤を叩きて古今の音律に心を寄せ、また小庭の隅にて蝋梅や菊芋を育てるを近頃の慰めとす。
      現在はコードタクトなる一座に身を寄せ、その業に従事せり。
      此度の関ケ原、皆々様との邂逅を静かに期するものなり。

  - name: "hasumikin"
    bushoName: "橘羽角前下総守情操指南匠均之助"
    role: "副将"
    githubID: "hasumikin"
    xID: "hasumikin"
    title: "PicoRubyに於けるRefinementsの再解釈"
    description: "我ら西軍の総大将が彼のCRubyに持ち込みたもうたRefinementsとやら誠に稀代の名策にございまする。されどこれぞ乱世の火種と囁かれ数多の勇者どもが屍を晒した元凶とも申す者あり。しかしながら！天下泰平のためとあらば血の一滴も惜しゅうはない。これすなわち必要の悪というもの。この真実、拙者がPicoRubyを通じたRefinementsの再解釈を以って天下に知らしめてみせよう。"
    bio: "Creator of PicoRuby and PicoRuby.wasm. Committer of mruby and mruby/c."
    bushoBio: |-
      拙者PicoRuby列びにPicoRuby.wasmを生み出せし者にしてmruby列びにmruby/cに筆を執る者なり。
