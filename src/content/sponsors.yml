    tier: "ruby"
    jobDescription: "「挑戦するエンジニアのプラットフォームをつくる。」をビジョンにエンジニアの可能性を広げるプロダクトを開発しています。ビルダー、FDE、SRE、データ基盤など多様な領域で採用強化中です。ぜひ話しましょう"
    jobUrl: "https://herp.careers/v1/findy/nT3K-kMC38zy"

