  - name: "株式会社メドレー"
    description: "メドレーは、「医療ヘルスケアの未来をつくる」のミッションのもと、テクノロジーを活用した事業やプロジェクトを通じて、医療ヘルスケア分野の課題を解決していきます。それにより、病院や行政による「持続可能な医療」の実現と、患者さんやそのご家族にとって「納得できる医療」の実現を目指しています。"
    url: "https://www.medley.jp"
    image: "/sekigahara01/sponsors/18.png"
    tier: "gold"
    jobDescription: "「納得できる医療」を、あなたのコードで。Rubyを愛し、社会を良くしたいエンジニアを大募集中です！"
    jobUrl: "https://www.medley.jp"

  - name: "株式会社TwoGate"
    description: "株式会社TwoGateは柔軟な発想と技術力で最高の共創パートナーを目指すエンジニア集団です。Railsを10年以上活用し、自社開発のローコードソリューションと個別開発を組み合わせたサービス提供を得意としています。 ライブエンタメの現場を快適にするソリューションを複数展開し、主に物販、チケットの現場からデジタル化を推進しています。"
    url: "https://twogate.com"
    image: "/sekigahara01/sponsors/20.png"
    tier: "ruby"

  - name: "ファインディ株式会社"
    description: "ファインディ株式会社は、「挑戦するエンジニアのプラットフォームをつくる。」をビジョンに掲げ、ハイスキルなエンジニアのスキルを見える化し、企業とのマッチングを成功に導くスカウト型リクルーティングサービス「Findy」/「Findy Freelance」、AI駆動開発の解析を行う「Findy AI+」などを提供しています。 スタートアップからDXを加速させたい大手企業まで4,000社以上に導入いただいております。 今後も「AI時代のエンジニアリング」を支援するため、人・AI・データ基盤などの領域でプロダクトを展開していきます。"
    url: "https://findy.co.jp/"
