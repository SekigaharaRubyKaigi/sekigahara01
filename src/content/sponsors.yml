sponsors:
  - name: "株式会社SmartHR"
    description: "「SmartHR」は、クラウド人事労務ソフトです。採用管理の情報から内定者の雇用契約や入社手続き、年末調整などの多様な労務手続きをペーパーレス化し、データとして蓄積。さらに、「SmartHR」に溜まった従業員データを活用した「人事評価」「従業員サーベイ」「配置シミュレーション」「スキル管理」などのタレントマネジメント機能により、組織の活性化や組織変革を推進し生産性向上を支援しています。アプリストアサービス「SmartHR Plus」は勤怠や給与などのサービスと連携できるアプリケーションを展開し、個社ごとのカスタマイズ性を高め、正確性や安全性の高いデータ連携を実現しています。「SmartHR」は、企業の生産性向上を後押しし、すべての人が働きやすい環境づくりに貢献します。私たちは、歴史に残る模範的なソフトウェアをつくる仲間を探しています。フルリモート勤務可能！"
    url: "https://hello-world.smarthr.co.jp/"
    image: "/sekigahara01/sponsors/19.png"
    tier: "ruby"
    jobDescription: "「SmartHR」は、企業の生産性向上を後押しし、すべての人が働きやすい環境づくりに貢献します。私たちは、歴史に残る模範的なソフトウェアをつくる仲間を探しています。フルリモート勤務可能！"
    jobUrl: "https://hello-world.smarthr.co.jp/"

  - name: "株式会社Leaner Technologies"
    description: "リーナーテクノロジーズは 調達購買（企業の買い物）の領域でクラウドサービスを展開するスタートアップです。見積業務・購買業務をアナログからデジタル化し、調達活動の高度化・効率化・コスト低減を実現します。"
    url: "https://leaner.co.jp/"
    image: "/sekigahara01/sponsors/15.png"
    tier: "gold"
    jobDescription: "エンタープライズ向けSaaSを一緒に作ってくれるエンジニア募集！プロダクトも基盤もRuby製です。（フルリモート前提）"
    jobUrl: "https://careers.leaner.co.jp/engineering"

  - name: "株式会社Gaji-Labo"
    description: "Gaji-Laboは、スタートアップや事業会社のプロダクトチーム支援を専門にしています。 UIデザイン、フロントエンド開発、プロダクトマネジメントの専門性を持ったメンバーが、チームの一員としてプロダクトの成長を支援します。 急成長期や混乱期は、人手を増やすだけでは乗り越えることができません。 専門家としてのスキルを持ち、改善に向けてチームワークを高められるメンバーが必要になったときにご相談ください。"
    url: "https://www.gaji.jp/"
    image: "/sekigahara01/sponsors/16.png"
    tier: "gold"
    jobDescription: "「すべての人々にとって選択の自由があることが当たり前な世界をつくる」スタートアップや事業会社のプロダクト成長を支援する一人目バックエンドエンジニア募集！"
    jobUrl: "https://www.gaji.jp/recruit"

